# Corredor CRM — Local development stack
# Start everything: docker compose up -d
# Or use: make dev-up

services:
  # ---------------------------------------------------------------------------
  # Postgres 16 — primary database (pgvector + PostGIS + pg_trgm)
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: corredor-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: corredor
      POSTGRES_PASSWORD: corredor
      POSTGRES_DB: corredor
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corredor -d corredor"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 7 — session store + BullMQ broker + rate limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: corredor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # MinIO — local Cloudflare R2 substitute for object storage
  # Console:  http://localhost:9001  (user: minioadmin / minioadmin)
  # API:      http://localhost:9000
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: corredor-minio
    restart: unless-stopped
    ports:
      - "9000:9000"  # S3-compatible API
      - "9001:9001"  # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # MinIO initializer — creates required buckets on first run
  minio-init:
    image: minio/mc:latest
    container_name: corredor-minio-init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/minio/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Mailhog — local SMTP catcher (view emails at http://localhost:8025)
  # SMTP: localhost:1025
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: corredor-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Jaeger — local OpenTelemetry trace viewer (optional)
  # UI: http://localhost:16686
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: corredor-jaeger
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "16686:16686" # Jaeger UI
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    profiles:
      - observability  # only started with: docker compose --profile observability up

# ---------------------------------------------------------------------------
# Named volumes — data persists between docker compose down / up
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    name: corredor_postgres_data
  redis_data:
    name: corredor_redis_data
  minio_data:
    name: corredor_minio_data