# Fly.io config for apps/worker (background jobs / Node 22)
app = "corredor-worker"
primary_region = "gru"  # São Paulo

[build]
  dockerfile = "apps/worker/Dockerfile"

[env]
  NODE_ENV = "production"

# Worker has no HTTP service — it connects outbound to Redis + Neon
# No [http_service] block intentionally

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Scale 0–1: idle when no jobs, wake on queue activity
[processes]
  app = "node dist/index.js"

[[services]]
  # Internal health TCP check (optional — worker can expose a minimal /health)
  internal_port = 9090
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.tcp_checks]]
    grace_period = "10s"
    interval = "30s"
    timeout = "5s"

[[regions]]
  gru = 1  # São Paulo

[deploy]
  strategy = "rolling"
  wait_timeout = "3m"
