# Fly.io config for apps/api (Hono / Node 22)
app = "corredor-api"
primary_region = "gru"  # São Paulo

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Production: 1–4 machines across GRU + SCL
[[regions]]
  gru = 2  # São Paulo (primary)
  scl = 1  # Santiago (secondary)

[deploy]
  strategy = "rolling"
  wait_timeout = "5m"

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/health"
    port = 8080
    timeout = "5s"
    type = "http"
