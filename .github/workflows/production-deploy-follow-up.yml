name: Production Deploy - Follow-up

on:
  workflow_run:
    workflows:
      - Production Deploy
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @corredor/db migrate

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          org: ${{ secrets.FLY_ORG }}

      - name: Deploy API to Fly.io
        run: cd apps/api && flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy Worker to Fly.io
        run: cd apps/worker && flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Build Web
        run: pnpm --filter @corredor/web build

      - name: Deploy Web to Cloudflare Pages
        run: npx wrangler pages deploy apps/web/dist --project-name=corredor-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build Admin
        run: pnpm --filter @corredor/admin build

      - name: Deploy Admin to Cloudflare Pages
        run: npx wrangler pages deploy apps/admin/dist --project-name=corredor-admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build Site
        run: pnpm --filter @corredor/site build

      - name: Deploy Site to Vercel
        run: npx vercel deploy apps/site/dist --prod --token $VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
