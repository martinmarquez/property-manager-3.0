name: Classifier Eval

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily (after nightly regression)
  workflow_dispatch:

jobs:
  eval:
    name: Intent classifier accuracy (>=80%)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run intent classifier eval
        run: pnpm --filter @corredor/ai eval:classifier
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVAL_OUTPUT_FILE: eval-baseline.json

      - name: Upload baseline artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: classifier-eval-baseline-${{ github.run_id }}
          path: eval-baseline.json
          retention-days: 90
