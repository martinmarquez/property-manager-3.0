name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check required secrets
        id: secrets-check
        run: |
          if [ -z "$NEON_PROJECT_ID" ] || [ -z "$NEON_API_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::NEON_PROJECT_ID or NEON_API_KEY not set — skipping preview deploy. Configure secrets to enable."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

      - name: Create Neon branch
        id: neon-branch
        if: steps.secrets-check.outputs.skip != 'true'
        run: |
          OUTPUT=$(./infra/neon/branch.sh ${{ github.event.pull_request.number }})
          echo "$OUTPUT"
          # branch.sh exports DB_URL and DB_URL_POOLED to $GITHUB_OUTPUT
        env:
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

      - name: Run Drizzle migrations on preview branch
        if: steps.secrets-check.outputs.skip != 'true'
        run: pnpm --filter @corredor/db migrate
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url_pooled }}
          DIRECT_DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}

      - name: Set up Fly.io CLI
        if: steps.secrets-check.outputs.skip != 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API to Fly.io (preview)
        if: steps.secrets-check.outputs.skip != 'true'
        run: |
          APP_NAME="corredor-api-pr-${{ github.event.pull_request.number }}"
          flyctl deploy \
            --config infra/fly/api.fly.toml \
            --app "$APP_NAME" \
            --remote-only \
            --wait-timeout 180 \
            --env DATABASE_URL="${{ steps.neon-branch.outputs.db_url_pooled }}" \
            --env DIRECT_DATABASE_URL="${{ steps.neon-branch.outputs.db_url }}" \
            --env NODE_ENV=preview \
            --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy Web to Cloudflare Pages (preview)
        id: cf-pages-web
        if: steps.secrets-check.outputs.skip != 'true'
        run: |
          pnpm --filter @corredor/web build
          pnpm dlx wrangler pages deploy apps/web/dist \
            --project-name corredor-web \
            --branch pr-${{ github.event.pull_request.number }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_API_URL: "https://corredor-api-pr-${{ github.event.pull_request.number }}.fly.dev"

      - name: Deploy Admin to Cloudflare Pages (preview)
        id: cf-pages-admin
        if: steps.secrets-check.outputs.skip != 'true'
        run: |
          pnpm --filter @corredor/admin build
          pnpm dlx wrangler pages deploy apps/admin/dist \
            --project-name corredor-admin \
            --branch pr-${{ github.event.pull_request.number }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_API_URL: "https://corredor-api-pr-${{ github.event.pull_request.number }}.fly.dev"

      - name: Deploy Site to Vercel (preview)
        id: vercel-site
        if: steps.secrets-check.outputs.skip != 'true'
        run: |
          cd apps/site
          DEPLOY_URL=$(pnpm dlx vercel pull --yes --environment=preview --token="${VERCEL_TOKEN}" 2>&1 && \
            pnpm dlx vercel build --token="${VERCEL_TOKEN}" 2>&1 && \
            pnpm dlx vercel deploy --prebuilt --token="${VERCEL_TOKEN}" 2>&1 | tail -1)
          echo "url=${DEPLOY_URL}" >> $GITHUB_OUTPUT
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_SITE }}
          NEXT_PUBLIC_API_URL: "https://corredor-api-pr-${{ github.event.pull_request.number }}.fly.dev"

      - name: Deploy Tenant Sites to Cloudflare Pages (preview)
        id: cf-pages-tenant-sites
        if: ${{ steps.secrets-check.outputs.skip != 'true' && secrets.CLOUDFLARE_TENANT_SITES_PROJECT_NAME != '' }}
        run: |
          pnpm --filter @corredor/tenant-site build
          pnpm dlx wrangler pages deploy .vercel/output/static \
            --project-name "$CLOUDFLARE_TENANT_SITES_PROJECT_NAME" \
            --branch "pr-${{ github.event.pull_request.number }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_TENANT_SITES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_TENANT_SITES_PROJECT_NAME }}
          NEXT_PUBLIC_API_URL: "https://corredor-api-pr-${{ github.event.pull_request.number }}.fly.dev"

      - name: Comment preview URLs on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.issue.number;
            const apiUrl = `https://corredor-api-pr-${pr}.fly.dev`;
            const siteUrl = '${{ steps.vercel-site.outputs.url }}' || '(see Vercel dashboard)';
            const body = [
              '## Preview Environment',
              '',
              `| Service   | URL |`,
              `|-----------|-----|`,
              `| Web App   | (see Cloudflare Pages — corredor-web/pr-${pr}) |`,
              `| Admin     | (see Cloudflare Pages — corredor-admin/pr-${pr}) |`,
              `| Site      | ${siteUrl} |`,
              `| API       | ${apiUrl} |`,
              '',
              `> Neon branch: \`pr-${pr}\``,
              `> Updated: ${new Date().toISOString()}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Preview Environment')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
