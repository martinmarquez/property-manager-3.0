name: Security

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main
  schedule:
    # Run full security scan daily at 3am ART
    - cron: "0 06 * * *"

jobs:
  # ── 1. npm audit ──────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail CI on high or critical CVEs
      - name: npm audit
        run: pnpm audit --audit-level=high
        # Do not continue on error — this is a hard gate
        continue-on-error: false

  # ── 2. Snyk vulnerability scan ────────────────────────────────────────────
  snyk:
    name: Snyk (open-source)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # required to upload SARIF
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Snyk token
        id: snyk-check
        run: |
          if [ -n "$SNYK_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SNYK_TOKEN secret is not set — skipping Snyk scan. Add the secret to enable."
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk — test all workspaces
        if: steps.snyk-check.outputs.has_token == 'true'
        uses: snyk/actions/node@master
        continue-on-error: false
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          # Fail on high/critical. medium/low → report only
          args: --severity-threshold=high --all-projects

      - name: Snyk — upload SARIF to GitHub Security tab
        if: steps.snyk-check.outputs.has_token == 'true'
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --sarif-file-output=snyk.sarif

      - name: Upload SARIF
        if: steps.snyk-check.outputs.has_token == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

  # ── 3. gitleaks — secrets in history ──────────────────────────────────────
  gitleaks:
    name: gitleaks (no secrets in git)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for gitleaks scan

      - name: gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        # Fail CI if any secrets are found — no exceptions
        continue-on-error: false

  # ── 4. CodeQL static analysis ─────────────────────────────────────────────
  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Security-extended queries — catches more OWASP issues
          queries: security-extended

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
