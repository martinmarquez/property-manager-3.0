name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy Preview Environment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Neon branch
        id: neon-branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: pr-${{ github.event.pull_request.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
          username: ${{ secrets.NEON_DB_USER }}
          database: ${{ secrets.NEON_DB_NAME }}

      - name: Run Drizzle migrations on preview branch
        run: pnpm --filter @corredor/api db:migrate
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url_with_pooler }}

      - name: Deploy API to Fly.io (preview)
        id: deploy-api
        uses: superfly/fly-pr-review-apps@1.3.0
        with:
          name: corredor-api-pr-${{ github.event.pull_request.number }}
          config: fly.api.toml
          org: ${{ secrets.FLY_ORG }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url_with_pooler }}
          DIRECT_DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}

      - name: Deploy Web to Fly.io (preview)
        id: deploy-web
        uses: superfly/fly-pr-review-apps@1.3.0
        with:
          name: corredor-web-pr-${{ github.event.pull_request.number }}
          config: fly.web.toml
          org: ${{ secrets.FLY_ORG }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          VITE_API_URL: https://corredor-api-pr-${{ github.event.pull_request.number }}.fly.dev

      - name: Comment preview URLs on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.issue.number;
            const apiUrl = `https://corredor-api-pr-${pr}.fly.dev`;
            const webUrl = `https://corredor-web-pr-${pr}.fly.dev`;
            const body = [
              '## Preview Environment',
              '',
              `| Service | URL |`,
              `|---------|-----|`,
              `| Web App | ${webUrl} |`,
              `| API     | ${apiUrl} |`,
              '',
              `> Neon branch: \`pr-${pr}\``,
              `> Updated: ${new Date().toISOString()}`,
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Preview Environment')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
